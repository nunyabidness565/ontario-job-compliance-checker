kind = "web"
previewPath = "/"
title = "Ontario Job Posting Compliance Checker"
version = "1.0.0"
id = "artifacts/compliance-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20756

[services.development]
run = "pnpm --filter @workspace/compliance-checker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/compliance-checker", "run", "build" ]
publicDir = "artifacts/compliance-checker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20756"
BASE_PATH = "/"
